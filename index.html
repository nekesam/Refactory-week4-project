<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <button id="addTaskBtn" class="add-btn">+Add Task</button>

        <ul id="taskList" class="task-list">
            <!-- Tasks will appear here -->
        </ul>
    </div>

    <!-- Modal for Add/Edit Task -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="closeBtn" id="closeModal">&times;</span>
            <h2 id="modalTitle">Add Task</h2>
            <form id="taskForm">
                <input type="hidden" id="task-id">
                <label>Title</label>
                <input type="text" id="taskTitle" required>
                
                <label>Description</label>
                <textarea id="taskDesc"></textarea>
                
                <label>Due Date & Time</label>
                <input type="datetime-local" id="taskDue" required>
                
                <button type="submit" id="saveTask">Save Task</button>
            </form>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
