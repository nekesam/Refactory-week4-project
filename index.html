<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="app-logo">
            <i class="fa-solid fa-list-check"></i>
        </div>
        <h1>To-Do List App</h1>
        <p>Create your task(s) and get organized Today!</p>
        <button id="addTaskBtn" class="add-btn">+Add Task</button>
        


        <ul id="taskList" class="task-list">
            <!-- Tasks will appear here -->
        </ul>
        <button id="logoutBtn" class="add-btn">Logout</button>
    </div>

    <!-- Modal for Add/Edit Task -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="closeBtn" id="closeModal">&times;</span>
            <h2 id="modalTitle">Add Task</h2>
            <form id="taskForm">
                <input type="hidden" id="task-id">
                <label>Title</label>
                <input type="text" id="taskTitle" required>
                
                <label>Description</label>
                <textarea id="taskDesc"></textarea>
                
                <label>Due Date & Time</label>
                <input type="datetime-local" id="taskDue" required>
                
                <button type="submit" id="saveTask">Save Task</button>
            </form>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
